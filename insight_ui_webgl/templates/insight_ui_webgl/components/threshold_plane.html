<div
  id="{{ tag_id }}"
  data-webgl-threshold
  data-viewport="{{ viewport_id }}"
  data-height="{{ height }}"
  data-color="{{ color }}"
  data-opacity="{{ opacity }}"
  data-width="{{ width }}"
  data-depth="{{ depth }}"
  data-visible="{{ visible|yesno:'true,false' }}"
  class="hidden"
  aria-hidden="true"
></div>
