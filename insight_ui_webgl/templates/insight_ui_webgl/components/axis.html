<div
  id="{{ tag_id }}"
  data-webgl-axis
  data-viewport="{{ viewport_id }}"
  data-x-label="{{ x_label }}"
  data-y-label="{{ y_label }}"
  data-z-label="{{ z_label }}"
  data-x-color="{{ x_color }}"
  data-y-color="{{ y_color }}"
  data-z-color="{{ z_color }}"
  data-x-length="{{ x_length }}"
  data-y-length="{{ y_length }}"
  data-z-length="{{ z_length }}"
  class="hidden"
  aria-hidden="true"
></div>
